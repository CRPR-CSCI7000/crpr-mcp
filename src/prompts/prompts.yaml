tools:
  list_capabilities: >
    List available capabilities or runtime helper ids.

    Use this first. The default view returns compact hits across workflows and execution patterns.
    Use `view="runtime_helpers"` to list runtime helper ids only.

    Parameters:
    - view (optional): `capabilities` (default) or `runtime_helpers`

    Output format:
    - Markdown text (human-readable summary cards).

  read_capability: >
    Read the full capability document for one capability id.

    Use this immediately after `list_capabilities` to confirm argument schema,
    constraints, examples, and expected output shape before execution.
    For `execution.run_custom_workflow_code`, this also includes embedded runtime-helper docs.

    Parameters:
    - capability_id (required): capability id from `list_capabilities`

    Output format:
    - Markdown text with JSON code fences for schema/examples/output shape.

  run_workflow_cli: >
    Execute a prebuilt workflow by CLI-style command.

    Prefer this path over generated scripts whenever a matching workflow exists.
    For PR-scoped code understanding tasks, prefer `symbol_definition`/`symbol_usage` first.
    Use `pr_file_context_reader` for source-repo reads (PR head/base SHA), and
    use `file_context_reader` only for cross-repo Zoekt reads.
    Hard limits: search context lines must be <= 2; file windows must be <= 60 lines.

    Parameters:
    - command (required): CLI form `<workflow_id> [--flag value]...`
    - timeout_seconds (optional): execution timeout (default 30, capped server-side)

    Output:
    - Markdown text with workflow-specific rendering (not raw JSON dumps).
    - Includes both `Process status` and `Output status` so execution vs parse/render issues are explicit.
    - Search-style workflows render concise match lists with line numbers.
    - File-context workflow renders a code block with line numbers.

  run_custom_workflow_code: >
    Execute generated custom workflow code in an isolated subprocess after AST safety checks.

    Use only when no prebuilt workflow can satisfy the task.
    Before using this tool, read `execution.run_custom_workflow_code` via `read_capability`.
    Runtime helper listing is available via `list_capabilities(view="runtime_helpers")`.

    Required script constraints:
    - generated code must be self-contained and executable as a script
    - import policy allows only approved modules; rely on `read_capability` for the current allowlist and runtime helper details
    - runtime helper calls can be used directly; no event-loop boilerplate is required for normal helper usage

    Parameters:
    - code (required): Python source code
    - timeout_seconds (optional): execution timeout

    Output format:
    - Markdown text with execution status and fenced sections for result_json/stdout/stderr.
    - Custom code may return output by printing plain text, printing JSON, or printing marker JSON.

guides:
  capability_first_flow: >
    Capability-first workflow:
    1. Call `list_capabilities`.
    2. Call `read_capability` on the best candidate id(s).
    3. Use `run_workflow_cli` for `symbol_definition`/`symbol_usage` to narrow scope.
    4. For source PR repo reads, use `pr_file_context_reader` pinned to PR ref (`head` by default).
    5. For cross-repo reads, use `file_context_reader` (source-repo reads are blocked there).
    6. For custom code, optionally call `list_capabilities(view="runtime_helpers")`, then read `execution.run_custom_workflow_code`.
    7. Use `run_custom_workflow_code` only as fallback.

    Execution marker convention:
    - Runner accepts marker output `__RESULT_JSON__=<json>`, plain JSON stdout, and plain text stdout.
    - The runner parses that payload into `ExecutionResult.result_json`.
