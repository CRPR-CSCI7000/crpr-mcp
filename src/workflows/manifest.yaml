workflows:
  - id: repo_discovery
    summary: Discover relevant repositories for a topic or component.
    when_to_use: Start here when you do not know which repos likely contain the target code.
    required_args:
      - query
    example: "run_workflow_cli(command=\"repo_discovery --query 'billing retry'\")"
    description: |
      Discover candidate repositories for an objective by running a repository-focused Zoekt search.
      This workflow transforms the objective into a `type:repo` query and returns ranked repository names.
    script_path: workflows/scripts/repo_discovery.py
    arg_schema:
      query:
        type: string
        required: true
        description: Free-form intent or component keywords used to discover candidate repos.
      limit:
        type: integer
        required: false
        default: 10
        description: Maximum search results to request.
    examples:
      - call: run_workflow_cli
        args:
          command: repo_discovery --query 'auth token refresh' --limit 12
    constraints:
      - Keep `limit` small (5-15) for focused discovery.
      - Uses Zoekt repository search mode (`type:repo`).
    expected_output_shape:
      repositories: list[string]
      results: list[object]
      total_hits: integer

  - id: symbol_definition
    summary: Find likely symbol definitions across repositories.
    when_to_use: Use when you need where a class/function/type is defined.
    required_args:
      - query
    example: "run_workflow_cli(command=\"symbol_definition --query 'SendMessage lang:go'\")"
    description: |
      Uses symbol-focused search to locate likely definition sites for a named symbol.
      Supports passing additional Zoekt filters inside `query` (for example repo/lang filters).
    script_path: workflows/scripts/symbol_definition.py
    arg_schema:
      query:
        type: string
        required: true
        description: Symbol query, optionally with filters (repo/lang/etc).
      limit:
        type: integer
        required: false
        default: 10
        description: Maximum number of hits.
    examples:
      - call: run_workflow_cli
        args:
          command: symbol_definition --query 'PaymentService lang:python'
    constraints:
      - Focused on definitions, not general usages.
      - Prefer adding `lang:` and `r:` filters for precision.
    expected_output_shape:
      query: string
      results: list[object]
      total_hits: integer

  - id: symbol_usage
    summary: Locate usages/call-sites of a symbol or API.
    when_to_use: Use after definitions are known and before reading file ranges directly.
    required_args:
      - query
    example: "run_workflow_cli(command=\"symbol_usage --query 'ProcessOrder r:checkout'\")"
    description: |
      Runs regular content search to surface symbol usage and call sites.
      Returns contextual snippets to help understand invocation patterns.
    script_path: workflows/scripts/symbol_usage.py
    arg_schema:
      query:
        type: string
        required: true
        description: Content query for usage/call-site discovery.
      limit:
        type: integer
        required: false
        default: 10
        description: Maximum number of hit groups.
      context_lines:
        type: integer
        required: false
        default: 2
        minimum: 0
        maximum: 2
        description: Context lines around each match.
    examples:
      - call: run_workflow_cli
        args:
          command: symbol_usage --query 'ProcessOrder -f:test lang:go' --limit 8 --context-lines 2
    constraints:
      - For definitions use `symbol_definition` instead.
      - Prefer this workflow to narrow targets before `pr_file_context_reader` or `file_context_reader`.
      - "`context_lines` is hard-limited to 2."
    expected_output_shape:
      query: string
      results: list[object]
      total_hits: integer

  - id: file_context_reader
    summary: Read a bounded line window from a non-source repository file (never source PR files).
    when_to_use: Use only after you identify a specific non-source repo file to inspect; never use for source PR files or changed-file validation.
    required_args:
      - source_owner
      - source_repo
      - repo
      - path
      - start_line
      - end_line
    example: 'run_workflow_cli(command="file_context_reader --source-owner acme --source-repo checkout --repo github.com/acme/inventory --path src/app.py --start-line 1 --end-line 60")'
    description: |
      Reads a specific line range from a file in a non-source repository via Zoekt.
      In PR-scoped analysis this workflow is cross-repo only; source repository reads are rejected.
    script_path: workflows/scripts/file_context_reader.py
    arg_schema:
      source_owner:
        type: string
        required: true
        description: Source PR repository owner/org.
      source_repo:
        type: string
        required: true
        description: Source PR repository name.
      repo:
        type: string
        required: true
        description: Target repository identifier (must not equal source repo).
      path:
        type: string
        required: true
        description: File path inside repository.
      start_line:
        type: integer
        required: true
        minimum: 1
        description: 1-indexed start line.
      end_line:
        type: integer
        required: true
        minimum: 1
        description: 1-indexed end line.
    examples:
      - call: run_workflow_cli
        args:
          command: file_context_reader --source-owner acme --source-repo checkout --repo github.com/acme/inventory --path src/service.py --start-line 40 --end-line 85
    constraints:
      - Source-repo reads are blocked; use `pr_file_context_reader` for source PR repository content.
      - Requires a file path, not a directory.
      - "Hard limit: requested window (`end_line - start_line + 1`) must be <= 60 lines."
      - Prefer iterative narrow reads over broad file grabs.
    expected_output_shape:
      source_owner: string
      source_repo: string
      repo: string
      path: string
      start_line: integer
      end_line: integer
      content: string
      evidence_origin: string

  - id: pr_file_context_reader
    summary: Read source PR repository file lines pinned to PR head/base SHA.
    when_to_use: Use for source-repo evidence in PR-scoped analysis, including changed files in the source PR.
    required_args:
      - owner
      - repo
      - pr_number
      - path
      - start_line
      - end_line
    example: 'run_workflow_cli(command="pr_file_context_reader --owner acme --repo checkout --pr-number 123 --path src/service.py --start-line 20 --end-line 60 --ref-side head")'
    description: |
      Reads a specific line range from a source-repo file using GitHub content at PR `head` or `base` SHA.
      This avoids branch/index ambiguity when evaluating source PR changes.
    script_path: workflows/scripts/pr_file_context_reader.py
    arg_schema:
      owner:
        type: string
        required: true
        description: Source PR repository owner or organization.
      repo:
        type: string
        required: true
        description: Source PR repository name.
      pr_number:
        type: integer
        required: true
        minimum: 1
        description: Pull request number.
      path:
        type: string
        required: true
        description: File path inside source repository.
      start_line:
        type: integer
        required: true
        minimum: 1
        description: 1-indexed start line.
      end_line:
        type: integer
        required: true
        minimum: 1
        description: 1-indexed end line.
      ref_side:
        type: string
        required: false
        default: head
        description: PR ref side to read from (`head` or `base`).
    examples:
      - call: run_workflow_cli
        args:
          command: pr_file_context_reader --owner acme --repo checkout --pr-number 123 --path src/service.py --start-line 20 --end-line 60 --ref-side head
      - call: run_workflow_cli
        args:
          command: pr_file_context_reader --owner acme --repo checkout --pr-number 123 --path src/service.py --start-line 20 --end-line 60 --ref-side base
    constraints:
      - Uses GitHub PR metadata and repository contents API.
      - Requires `GITHUB_TOKEN`.
      - "Hard limit: requested window (`end_line - start_line + 1`) must be <= 60 lines."
    expected_output_shape:
      owner: string
      repo: string
      pr_number: integer
      path: string
      start_line: integer
      end_line: integer
      content: string
      ref_side: string
      ref_name: string
      ref_sha: string
      evidence_origin: string

  - id: pr_context_summary
    summary: Build concise PR context from GitHub metadata and file list.
    when_to_use: Use first for pull-request scoped analysis before deeper workflows.
    required_args:
      - owner
      - repo
      - pr_number
    example: 'run_workflow_cli(command="pr_context_summary --owner acme --repo checkout --pr-number 123")'
    description: |
      Retrieves PR metadata and changed files from GitHub and returns a compact summary.
      This is the baseline context workflow for PR-scoped sessions.
    script_path: workflows/scripts/pr_context_summary.py
    arg_schema:
      owner:
        type: string
        required: true
        description: Repository owner or organization.
      repo:
        type: string
        required: true
        description: Repository name.
      pr_number:
        type: integer
        required: true
        minimum: 1
        description: Pull request number.
    examples:
      - call: run_workflow_cli
        args:
          command: pr_context_summary --owner acme --repo checkout --pr-number 123
    constraints:
      - Requires GitHub API access (`GITHUB_TOKEN`).
      - Returns compact file metadata, not full patches.
    expected_output_shape:
      owner: string
      repo: string
      pr_number: integer
      pr: object
      summary: object
      files: list[object]

  - id: pr_change_surface
    summary: Analyze PR change surface by status, directory, and extension.
    when_to_use: Use after `pr_context_summary` to assess blast radius and review hotspots.
    required_args:
      - owner
      - repo
      - pr_number
    example: 'run_workflow_cli(command="pr_change_surface --owner acme --repo checkout --pr-number 123")'
    description: |
      Builds a structured change-surface report from PR files.
      Includes totals, status mix, touched directories, extension-level stats, and largest file changes.
    script_path: workflows/scripts/pr_change_surface.py
    arg_schema:
      owner:
        type: string
        required: true
        description: Repository owner or organization.
      repo:
        type: string
        required: true
        description: Repository name.
      pr_number:
        type: integer
        required: true
        minimum: 1
        description: Pull request number.
    examples:
      - call: run_workflow_cli
        args:
          command: pr_change_surface --owner acme --repo checkout --pr-number 123
    constraints:
      - Requires GitHub API access (`GITHUB_TOKEN`).
      - Designed for topology/impact analysis rather than patch-level semantics.
    expected_output_shape:
      owner: string
      repo: string
      pr_number: integer
      totals: object
      status_counts: list[object]
      directory_counts: list[object]
      extension_summary: list[object]
      largest_files: list[object]

  - id: pr_cross_repo_overlap_candidates
    summary: Find lexical overlap candidates for cross-repo contract checks.
    when_to_use: Use for candidate generation after PR change-surface analysis.
    required_args:
      - owner
      - repo
      - pr_number
    example: 'run_workflow_cli(command="pr_cross_repo_overlap_candidates --owner acme --repo checkout --pr-number 123")'
    description: |
      Uses PR changed-file terms to probe indexed repositories for lexical overlap candidates.
      By default, all indexed repositories are scanned and the canonical source repo is excluded.
    script_path: workflows/scripts/pr_cross_repo_overlap_candidates.py
    arg_schema:
      owner:
        type: string
        required: true
        description: Repository owner or organization.
      repo:
        type: string
        required: true
        description: Repository name.
      pr_number:
        type: integer
        required: true
        minimum: 1
        description: Pull request number.
      include_source_repo:
        type: boolean
        required: false
        default: false
        description: Include canonical source repo in scanning.
      max_repos:
        type: integer
        required: false
        default: 0
        minimum: 0
        description: Optional cap on scanned repositories. 0 scans all indexed repos.
      per_term_limit:
        type: integer
        required: false
        default: 3
        minimum: 1
        description: Max Zoekt hits captured per term/repo query.
    examples:
      - call: run_workflow_cli
        args:
          command: pr_cross_repo_overlap_candidates --owner acme --repo checkout --pr-number 123
      - call: run_workflow_cli
        args:
          command: pr_cross_repo_overlap_candidates --owner acme --repo checkout --pr-number 123 --include-source-repo true
    constraints:
      - Defaults to all indexed repositories.
      - Canonical source repo is excluded by default unless `include_source_repo=true`.
      - Heuristic candidate detector; overlap hits are not confirmed contract conflicts.
      - Always follow up with targeted workflows before reporting concrete cross-repo risk.
    expected_output_shape:
      owner: string
      repo: string
      pr_number: integer
      include_source_repo: boolean
      inspected_repo_count: integer
      excluded_source_repos: list[string]
      changed_files: list[string]
      search_terms: list[string]
      overlap_candidates: list[object]
      confirmed_conflicts: list[object]
      no_confirmed_conflicts: boolean
      no_confirmed_conflicts_reason: string
      validation_summary: object
      errors: list[object]

runtime_tools:
  - id: runtime.search
    summary: General Zoekt content search wrapper.
    when_to_use: Use for broad code/content discovery or usage search.
    required_args:
      - query
    example: 'runtime.zoekt_tools.search(query="payment retry", limit=8, context_lines=1)'
    description: Search indexed repositories using Zoekt query syntax.
    arg_schema:
      query:
        type: string
        required: true
      limit:
        type: integer
        required: false
      context_lines:
        type: integer
        required: false
    examples:
      - call: runtime.zoekt_tools.search
        args:
          query: error handler lang:python
          limit: 8
          context_lines: 1
    constraints:
      - Respect small limits and focused queries.
      - "`context_lines` is hard-limited to 2."
    expected_output_shape:
      results: list[object]

  - id: runtime.search_symbols
    summary: Symbol-focused Zoekt search wrapper.
    when_to_use: Use primarily to find symbol definitions.
    required_args:
      - query
    example: 'runtime.zoekt_tools.search_symbols(query="PaymentClient lang:go", limit=8)'
    description: Symbol-oriented search helper for definitions.
    arg_schema:
      query:
        type: string
        required: true
      limit:
        type: integer
        required: false
    examples:
      - call: runtime.zoekt_tools.search_symbols
        args:
          query: UserController lang:python
          limit: 10
    constraints:
      - Prefer for definition lookup.
    expected_output_shape:
      results: list[object]

  - id: runtime.fetch_content
    summary: Fetch a bounded file content range.
    when_to_use: Use once repo/path and line window are known.
    required_args:
      - repo
      - path
      - start_line
      - end_line
    example: 'runtime.zoekt_tools.fetch_content(repo="github.com/org/repo", path="src/main.go", start_line=1, end_line=60)'
    description: Fetch file content from Zoekt print endpoint.
    arg_schema:
      repo:
        type: string
        required: true
      path:
        type: string
        required: true
      start_line:
        type: integer
        required: true
      end_line:
        type: integer
        required: true
    examples:
      - call: runtime.zoekt_tools.fetch_content
        args:
          repo: github.com/org/repo
          path: src/main.go
          start_line: 1
          end_line: 60
    constraints:
      - Requires a file path; directories are invalid.
      - "Hard limit: requested window (`end_line - start_line + 1`) must be <= 60 lines."
    expected_output_shape:
      content: string

  - id: runtime.list_dir
    summary: List directory tree for repository path.
    when_to_use: Use for repository structure exploration.
    required_args:
      - repo
    example: 'runtime.zoekt_tools.list_dir(repo="github.com/org/repo", path="src", depth=2)'
    description: List directory structure under a repository path.
    arg_schema:
      repo:
        type: string
        required: true
      path:
        type: string
        required: false
      depth:
        type: integer
        required: false
    examples:
      - call: runtime.zoekt_tools.list_dir
        args:
          repo: github.com/org/repo
          path: src
          depth: 2
    constraints:
      - Prefer shallow depth initially.
    expected_output_shape:
      tree: string

  - id: runtime.list_repos
    summary: List all indexed repositories.
    when_to_use: Use to discover repository scope for further workflows.
    required_args: []
    example: "runtime.zoekt_tools.list_repos()"
    description: Return sorted set of indexed repository names.
    arg_schema: {}
    examples:
      - call: runtime.zoekt_tools.list_repos
        args: {}
    constraints:
      - Use as lightweight scope discovery before targeting specific repos.
    expected_output_shape:
      repos: list[string]

  - id: runtime.github_get_pull_request
    summary: Fetch GitHub pull request metadata.
    when_to_use: Use when workflow code needs PR metadata (title/state/base/head/stats).
    required_args:
      - owner
      - repo
      - pr_number
    example: 'runtime.github_tools.get_pull_request(owner="acme", repo="checkout", pr_number=123)'
    description: Retrieve pull request metadata from GitHub REST API.
    arg_schema:
      owner:
        type: string
        required: true
      repo:
        type: string
        required: true
      pr_number:
        type: integer
        required: true
    examples:
      - call: runtime.github_tools.get_pull_request
        args:
          owner: acme
          repo: checkout
          pr_number: 123
    constraints:
      - Requires `GITHUB_TOKEN`.
      - Uses retry handling for transient API failures.
    expected_output_shape:
      pull_request: object

  - id: runtime.github_list_pull_request_files
    summary: Fetch complete GitHub pull request file list.
    when_to_use: Use when workflow code needs changed files for PR-level analysis.
    required_args:
      - owner
      - repo
      - pr_number
    example: 'runtime.github_tools.list_pull_request_files(owner="acme", repo="checkout", pr_number=123)'
    description: List pull request files from GitHub REST API with pagination handling.
    arg_schema:
      owner:
        type: string
        required: true
      repo:
        type: string
        required: true
      pr_number:
        type: integer
        required: true
    examples:
      - call: runtime.github_tools.list_pull_request_files
        args:
          owner: acme
          repo: checkout
          pr_number: 123
    constraints:
      - Requires `GITHUB_TOKEN`.
      - Handles API pagination and retry logic.
    expected_output_shape:
      files: list[object]

  - id: runtime.github_get_file_content
    summary: Fetch file content from GitHub repository at an optional ref.
    when_to_use: Use when workflow code needs exact source content at PR head/base SHA.
    required_args:
      - owner
      - repo
      - path
    example: 'runtime.github_tools.get_file_content(owner="acme", repo="checkout", path="src/service.py", ref="2f4d9d0")'
    description: Retrieve UTF-8 file content from GitHub Contents API, optionally pinned to a branch/SHA ref.
    arg_schema:
      owner:
        type: string
        required: true
      repo:
        type: string
        required: true
      path:
        type: string
        required: true
      ref:
        type: string
        required: false
    examples:
      - call: runtime.github_tools.get_file_content
        args:
          owner: acme
          repo: checkout
          path: src/service.py
          ref: 2f4d9d0
    constraints:
      - Requires `GITHUB_TOKEN`.
      - Use explicit SHA refs for deterministic PR-source reads.
    expected_output_shape:
      content: string

execution_patterns:
  - id: execution.run_workflow_cli
    summary: Preferred path for repeatable analysis tasks.
    when_to_use: Use when a prebuilt workflow already fits the objective.
    required_args:
      - command
    example: "run_workflow_cli(command=\"repo_discovery --query 'auth'\")"
    description: Execute a prebuilt workflow script via CLI-style command flags and timeout controls.
    arg_schema:
      command:
        type: string
        required: true
      timeout_seconds:
        type: integer
        required: false
    examples:
      - call: run_workflow_cli
        args:
          command: symbol_definition --query 'ProcessOrder lang:go'
          timeout_seconds: 30
    constraints:
      - Prefer this before generating custom workflow code.
      - Timeout is capped by server policy.
    expected_output_shape:
      success: boolean
      exit_code: integer
      result_json: object|null

  - id: execution.run_custom_workflow_code
    summary: Fallback path for one-off tasks not covered by workflows.
    when_to_use: Use only when no prebuilt workflow can satisfy the objective, and only after calling read_capability for this id to confirm constraints.
    required_args:
      - code
    example: 'run_custom_workflow_code(code="...")'
    description: |
      Execute generated code after AST safety checks in an isolated subprocess.
      Code is executed directly as a script (`__main__`).
      Runtime helper details are provided in `read_capability(execution.run_custom_workflow_code)`.
      Use self-contained code and emit output via stdout:
      plain text, plain JSON, or `__RESULT_JSON__=<json>` marker (optional).
    arg_schema:
      code:
        type: string
        required: true
      timeout_seconds:
        type: integer
        required: false
    examples:
      - call: run_custom_workflow_code
        args:
          code: |
            import json
            from runtime import github_tools

            pr = github_tools.get_pull_request("acme", "checkout", 123)
            print(json.dumps({"title": pr.get("title", "")}, ensure_ascii=True))
    constraints:
      - >
        Import policy: custom code may import only approved modules from the safety allowlist.
        Use runtime helpers via `from runtime import zoekt_tools, github_tools`,
        `import runtime.zoekt_tools as zoekt_tools`, or `import runtime.github_tools as github_tools`.
      - Any other imports and banned calls are rejected before execution.
      - For best structured outputs, print JSON or marker JSON; plain text stdout is also accepted.
      - This is process-level isolation, not container-grade sandboxing.
    expected_output_shape:
      success: boolean
      exit_code: integer
      safety_rejections: list[string]
      result_json: object|null
